name: Build and Push to ECR

on:
  workflow_dispatch:
    inputs:
      service:
        description: Which image to build and push
        type: choice
        options:
          - api
          - frontend
        required: true
        default: api
      tag:
        description: Image tag to push (default latest)
        type: string
        required: false
        default: latest

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: from-field-dev-api
  ECR_REPO_FRONTEND: from-field-dev-frontend
  IMAGE_TAG: ${{ inputs.tag }}

jobs:
  build-and-push:
    name: Build and Push (${{ inputs.service }}) to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: ${{ inputs.service == 'api' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_API }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_API }}:${{ github.sha }}

      - name: Build and push Frontend image
        if: ${{ inputs.service == 'frontend' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:${{ github.sha }}
